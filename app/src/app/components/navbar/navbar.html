<nav class="sticky top-0 z-50 bg-white/70 backdrop-blur-md shadow-md">
  <div class="max-w-7xl mx-auto px-4 md:px-6">
    <div class="flex justify-between items-center h-full">

      <!-- Logo -->
      <div class="flex items-center flex-shrink-0">
        <img src="logo2.jpg" alt="UAC Logo" class="h-12 md:h-14 w-auto">
      </div>

      <!-- Desktop Menu -->
      <div class="hidden lg:flex items-center gap-4 xl:gap-5 text-sm font-semibold">
        <a *ngFor="let link of navLinks"
           [routerLink]="link.path"
           routerLinkActive="text-[#B8860B]"
           class="nav-link text-gray-700 hover:cursor-pointer whitespace-nowrap">

          <span class="lang-en">
            <span *ngFor="let letter of link.label | splitLetters; let i = index"
                  class="letter"
                  [style.animation-delay.ms]="i * 35">{{ letter === ' ' ? '\u00A0' : letter }}</span>
          </span>

        </a>
      </div>

      <!-- Mobile Menu Button -->
      <button (click)="toggleMobileMenu()" class="lg:hidden text-3xl text-gray-700 flex-shrink-0">
        ☰
      </button>
    </div>
  </div>

  <!-- Mobile Menu -->
  <div [class.hidden]="!isMobileMenuOpen" class="lg:hidden bg-white/90 backdrop-blur-md border-t">
    <div class="px-6 py-4 flex flex-col gap-4 text-sm font-medium">
      <a *ngFor="let link of navLinks"
         [routerLink]="link.path"
         routerLinkActive="text-[#B8860B]"
         (click)="toggleMobileMenu()"
         class="text-gray-700 hover:text-[#B8860B] hover:cursor-pointer">{{ link.label }}</a>
    </div>
  </div>
</nav>
